<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>또다른 경제교실 - 스마트 금융 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f9; margin: 0; transition: background-color 0.3s; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .custom-shadow { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08); }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .banner-transition { transition: all 0.5s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 학생 명단 (백한율 수정 반영)
        const INITIAL_STUDENTS = [
            { id: '6701', name: '강유주' }, { id: '6702', name: '고윤서' }, { id: '6703', name: '공윤호' },
            { id: '6704', name: '김성민' }, { id: '6705', name: '김태윤' }, { id: '6706', name: '나현웅' },
            { id: '6707', name: '류찬혁' }, { id: '6708', name: '문예린' }, { id: '6709', name: '박소율' },
            { id: '6710', name: '박채윤' }, { id: '6711', name: '배예람' }, { id: '6712', name: '백한율' },
            { id: '6713', name: '우은서' }, { id: '6714', name: '우진서' }, { id: '6715', name: '윤소영' },
            { id: '6716', name: '임소윤' }, { id: '6717', name: '임수현' }, { id: '6718', name: '정시후' },
            { id: '6719', name: '조수빈' }, { id: '6720', name: '최리한' }, { id: '6721', name: '최은수' },
            { id: '6722', name: '최준성' }, { id: '6723', name: '하예준' }, { id: '6724', name: '허단' }
        ];

        const THEMES = {
            purple: { main: 'bg-indigo-600', text: 'text-indigo-600', border: 'border-indigo-600', light: 'bg-indigo-50', gradient: 'from-purple-600 to-fuchsia-500' },
            blue: { main: 'bg-blue-600', text: 'text-blue-600', border: 'border-blue-600', light: 'bg-blue-50', gradient: 'from-blue-600 to-cyan-500' },
            rose: { main: 'bg-rose-500', text: 'text-rose-500', border: 'border-rose-500', light: 'bg-rose-50', gradient: 'from-rose-500 to-orange-400' },
            emerald: { main: 'bg-emerald-500', text: 'text-emerald-500', border: 'border-emerald-500', light: 'bg-emerald-50', gradient: 'from-emerald-500 to-teal-400' },
            dark: { main: 'bg-slate-800', text: 'text-slate-800', border: 'border-slate-800', light: 'bg-slate-100', gradient: 'from-slate-800 to-slate-600' }
        };

        const EMOJIS = ['👤', '🦁', '🐱', '🦊', '🐻', '🐼', '🐨', '🐯', '🐸', '🦄', '🐲', '⭐', '💎', '🔥', '🌈'];

        const App = () => {
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('econ_v4_students');
                if (saved) return JSON.parse(saved);
                return [
                    ...INITIAL_STUDENTS.map(s => ({ 
                        ...s, password: s.id, balance: 0, profileEmoji: '👤', profileImg: null, 
                        theme: 'purple', subscriptions: [], role: 'student' 
                    })),
                    { id: 'admin', name: '관리자', password: '0000', balance: 0, profileEmoji: '👑', profileImg: null, theme: 'dark', role: 'admin' }
                ];
            });

            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); 
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('econ_v4_history') || '[]'));
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('econ_v4_products') || '[{"id":1, "name":"기본 성장 예금", "rate":3, "isEvent": false}]'));
            const [selectedIds, setSelectedIds] = useState([]);
            const [toast, setToast] = useState(null);
            const [activeBanner, setActiveBanner] = useState(0); // 0: 공모전, 1: 이자이벤트

            useEffect(() => localStorage.setItem('econ_v4_students', JSON.stringify(students)), [students]);
            useEffect(() => localStorage.setItem('econ_v4_history', JSON.stringify(history)), [history]);
            useEffect(() => localStorage.setItem('econ_v4_products', JSON.stringify(products)), [products]);

            // 배너 자동 전환
            useEffect(() => {
                const timer = setInterval(() => setActiveBanner(prev => (prev === 0 ? 1 : 0)), 5000);
                return () => clearInterval(timer);
            }, []);

            const currentTheme = THEMES[user?.theme || 'purple'];

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // 이벤트 시간 체크 (3월 18일 08:00 ~ 3월 20일 22:00)
            const checkEventTime = () => {
                const now = new Date();
                const start = new Date(2026, 2, 18, 8, 0, 0); // Month is 0-indexed (2 = March)
                const end = new Date(2026, 2, 20, 22, 0, 0);
                return { 
                    active: now >= start && now <= end, 
                    waiting: now < start, 
                    ended: now > end,
                    start, end 
                };
            };

            const handleLogin = (name, pw) => {
                const found = students.find(s => s.name === name && s.password === pw);
                if (found) {
                    setUser(found);
                    setView('home');
                    showToast(`${found.name}님 반가워요!`);
                } else {
                    showToast('정보가 일치하지 않습니다.', 'error');
                }
            };

            const updateUser = (data) => {
                setStudents(prev => prev.map(s => s.id === user.id ? { ...s, ...data } : s));
                setUser(prev => ({ ...prev, ...data }));
            };

            const handleProfileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => updateUser({ profileImg: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const handleAction = (type, amount, reason) => {
                const val = parseInt(amount);
                if (isNaN(val) || val <= 0 || selectedIds.length === 0) return showToast('금액과 대상을 확인하세요.', 'error');

                const groupId = Date.now();
                const targetNames = students.filter(s => selectedIds.includes(s.id)).map(s => s.name);
                
                setStudents(prev => prev.map(s => {
                    if (selectedIds.includes(s.id)) {
                        return { ...s, balance: type === 'issue' ? s.balance + val : s.balance - val };
                    }
                    return s;
                }));

                const newLog = {
                    id: groupId, targets: [...selectedIds], targetNames,
                    summary: `${targetNames[0]}${targetNames.length > 1 ? ` 외 ${targetNames.length - 1}명` : ''}`,
                    type, amount: val, reason: reason || (type === 'issue' ? '기타 지급' : '벌금'),
                    date: new Date().toLocaleString(), status: 'active'
                };

                setHistory(prev => [newLog, ...prev]);
                setSelectedIds([]);
                showToast('처리가 완료되었습니다.');
            };

            const eventTime = checkEventTime();

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                    <div className="max-w-4xl w-full bg-white rounded-[2.5rem] shadow-2xl flex flex-col md:flex-row overflow-hidden min-h-[550px]">
                        <div className="md:w-5/12 bg-indigo-600 p-12 text-white flex flex-col justify-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10 text-9xl rotate-12"><i className="fas fa-coins"></i></div>
                            <h1 className="text-4xl font-black mb-4 z-10 tracking-tighter">또다른<br/>경제교실</h1>
                            <p className="text-white/70 font-medium z-10">스마트하고 즐거운 우리반 경제 활동</p>
                        </div>
                        <div className="md:w-7/12 p-12 flex flex-col justify-center bg-white">
                            <h2 className="text-2xl font-black text-slate-800 mb-8">로그인</h2>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 ml-1 mb-2 block uppercase">학생 본명</label>
                                    <input id="uname" type="text" placeholder="이름 입력" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-bold" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 ml-1 mb-2 block uppercase">비밀번호 (초기: 접속번호)</label>
                                    <input id="upw" type="password" placeholder="••••" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-bold" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('uname').value, document.getElementById('upw').value)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all mt-4">입장하기</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen bg-[#f3f4f9] pb-10`}>
                    {/* 상단 듀얼 배너 */}
                    <div className={`bg-gradient-to-r ${currentTheme.gradient} text-white py-3 px-6 flex justify-between items-center sticky top-0 z-[60] shadow-md banner-transition overflow-hidden`}>
                        {activeBanner === 0 ? (
                            <div className="flex items-center gap-4 w-full animate-fade">
                                <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black">EVENT 01</span>
                                <p className="text-sm font-bold flex-1 truncate">📢 [공모전] 경제교실 이름 공모전 진행 중! (~3/25)</p>
                                <button onClick={() => window.open('https://naver.me/xQJAYc2r', '_blank')} className="bg-white text-indigo-600 px-4 py-1 rounded-full text-xs font-black whitespace-nowrap">신청하기</button>
                            </div>
                        ) : (
                            <div className="flex items-center gap-4 w-full animate-fade">
                                <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black">EVENT 02</span>
                                <p className="text-sm font-bold flex-1 truncate">🔥 [초특가] 단 62시간! 1분에 1% 이자 예금 특별 판매 예정</p>
                                <span className="text-[10px] font-black opacity-80">3/18 08:00 OPEN</span>
                            </div>
                        )}
                    </div>

                    {/* Nav */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-[48px] z-50">
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 ${currentTheme.main} rounded-xl flex items-center justify-center text-white shadow-lg`}><i className="fas fa-wallet"></i></div>
                            <span className="font-black text-xl text-slate-800">ECONOMY</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('home')} className={`px-6 py-2 rounded-lg text-sm font-bold ${view === 'home' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>홈</button>
                            <button onClick={() => setView('bank')} className={`px-6 py-2 rounded-lg text-sm font-bold ${view === 'bank' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>은행</button>
                            {user.role === 'admin' && (
                                <button onClick={() => setView('admin')} className={`px-6 py-2 rounded-lg text-sm font-bold ${view === 'admin' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>관리자</button>
                            )}
                        </div>
                        <button onClick={() => setView('login')} className="text-slate-400 hover:text-rose-500"><i className="fas fa-power-off text-xl"></i></button>
                    </nav>

                    <main className="max-w-6xl mx-auto p-8 animate-fade">
                        {view === 'home' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 space-y-8">
                                    <div className="bg-white rounded-[2.5rem] p-10 custom-shadow flex items-center justify-between relative overflow-hidden group">
                                        <div className="relative z-10">
                                            <p className="text-slate-400 font-bold text-sm mb-2">현재 보유 자산</p>
                                            <div className="flex items-baseline gap-2">
                                                <span className={`text-7xl font-black tracking-tighter transition-all ${currentTheme.text}`}>{user.balance.toLocaleString()}</span>
                                                <span className="text-2xl font-black text-slate-300">G</span>
                                            </div>
                                        </div>
                                        <div className={`w-32 h-32 rounded-full ${currentTheme.light} flex items-center justify-center text-4xl group-hover:scale-110 transition-all duration-500`}>
                                            <i className={`fas fa-coins ${currentTheme.text}`}></i>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[2.5rem] p-8 custom-shadow">
                                        <h3 className="text-lg font-black mb-6 flex items-center gap-2">거래 내역</h3>
                                        <div className="space-y-3">
                                            {history.filter(h => user.role === 'admin' || h.targets.includes(user.id)).slice(0, 10).map(h => (
                                                <div key={h.id} className={`p-4 rounded-2xl flex items-center justify-between ${h.status === 'cancelled' ? 'opacity-30' : 'bg-slate-50'}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${h.type === 'issue' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            <i className={`fas fa-${h.type === 'issue' ? 'plus' : 'minus'}`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="text-sm font-black text-slate-700">{h.reason} <span className="text-xs text-slate-400 font-bold ml-1">{h.summary}</span></p>
                                                            <p className="text-[10px] font-bold text-slate-400 uppercase">{h.date}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`font-black ${h.type === 'issue' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {h.type === 'issue' ? '+' : '-'}{h.amount.toLocaleString()}G
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-8">
                                    {/* Personal Profile & Customizing */}
                                    <div className="bg-white rounded-[2.5rem] p-8 custom-shadow text-center">
                                        <div className="relative inline-block mb-4 group">
                                            <div className="w-24 h-24 rounded-[2rem] bg-slate-100 border-4 border-white shadow-xl overflow-hidden flex items-center justify-center text-5xl">
                                                {user.profileImg ? <img src={user.profileImg} className="w-full h-full object-cover" /> : user.profileEmoji}
                                            </div>
                                            <label className="absolute -bottom-2 -right-2 w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-slate-400 cursor-pointer hover:text-indigo-600 border border-slate-100">
                                                <i className="fas fa-camera text-sm"></i>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleProfileUpload} />
                                            </label>
                                        </div>
                                        <h4 className="font-black text-slate-800 text-lg">{user.name}</h4>
                                        <p className="text-xs font-bold text-slate-400 mb-6">{user.role === 'admin' ? 'SYSTEM ADMIN' : `접속번호: ${user.id}`}</p>
                                        
                                        <div className="border-t border-slate-100 pt-6 space-y-6">
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest text-left">Emoji Select</p>
                                                <div className="grid grid-cols-5 gap-2">
                                                    {EMOJIS.map(e => (
                                                        <button key={e} onClick={() => updateUser({ profileEmoji: e, profileImg: null })} className={`text-xl p-2 rounded-lg hover:bg-slate-50 ${user.profileEmoji === e && !user.profileImg ? 'bg-indigo-50 border border-indigo-100' : ''}`}>{e}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest text-left">Theme Select</p>
                                                <div className="flex gap-2">
                                                    {Object.keys(THEMES).map(t => (
                                                        <button key={t} onClick={() => updateUser({ theme: t })} className={`flex-1 h-8 rounded-lg ${THEMES[t].main} ${user.theme === t ? 'ring-4 ring-offset-2 ring-slate-200 shadow-inner' : 'opacity-60'}`}></button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'bank' && (
                            <div className="space-y-8 animate-fade">
                                <div className="bg-white rounded-[2.5rem] p-10 custom-shadow">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-2xl font-black">중앙은행 예금 센터</h2>
                                        {user.role === 'admin' && (
                                            <button onClick={() => {
                                                const name = prompt('예금 상품명?');
                                                const rate = prompt('이율(%)?');
                                                if(name && rate) setProducts([...products, { id: Date.now(), name, rate: parseInt(rate), isEvent: false }]);
                                            }} className="w-10 h-10 bg-indigo-600 text-white rounded-xl"><i className="fas fa-plus"></i></button>
                                        )}
                                    </div>

                                    {/* 특판 배너 (은행 상단) */}
                                    <div className="bg-indigo-900 rounded-3xl p-8 text-white mb-10 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                                        <div className="relative z-10 flex-1">
                                            <span className="bg-amber-400 text-amber-950 px-3 py-1 rounded-full text-[10px] font-black uppercase mb-3 inline-block">Flash Sale Event</span>
                                            <h3 className="text-3xl font-black mb-2 leading-tight">62시간 한정!<br/>1분에 1% 타임어택 예금</h3>
                                            <p className="text-indigo-200 text-sm font-medium">3월 18일 08:00 부터 오픈됩니다. 절호의 기회를 놓치지 마세요!</p>
                                        </div>
                                        <div className="bg-indigo-800 p-6 rounded-2xl border border-indigo-700 text-center min-w-[200px] z-10">
                                            <p className="text-xs font-black text-indigo-400 uppercase mb-2">오픈 시간</p>
                                            <p className="font-black text-lg">03. 18 (수) 08:00</p>
                                        </div>
                                        <i className="fas fa-bolt text-[10rem] absolute -right-4 -bottom-4 text-indigo-800 opacity-50 rotate-12"></i>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {/* 이벤트 예금 수동 추가 */}
                                        <div className={`p-8 rounded-[2rem] border-2 flex flex-col justify-between ${eventTime.active ? 'border-amber-400 bg-amber-50' : 'border-slate-100 bg-slate-50 grayscale opacity-70'}`}>
                                            <div>
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="text-amber-600 text-xs font-black bg-white px-3 py-1 rounded-full">SPECIAL EVENT</span>
                                                    <span className="text-xl font-black text-amber-600">62hr 특판</span>
                                                </div>
                                                <h4 className="text-xl font-black text-slate-800 mb-1">1분당 1% 초고금리 예금</h4>
                                                <p className="text-xs font-bold text-slate-400 mb-6">최소 100G ~ 최대 1,000G</p>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-6">
                                                    <span className="text-4xl font-black text-slate-800 tracking-tighter">1.0<span className="text-lg">%</span></span>
                                                    <span className="text-xs font-bold text-slate-400 mb-1">매 1분마다 이자 발생</span>
                                                </div>
                                                <button 
                                                    disabled={!eventTime.active}
                                                    onClick={() => {
                                                        const amt = prompt('예치할 금액을 입력하세요(100~1000G)');
                                                        const val = parseInt(amt);
                                                        if(isNaN(val) || val < 100 || val > 1000) return showToast('금액 범위를 확인하세요.', 'error');
                                                        if(user.balance < val) return showToast('잔액이 부족합니다.', 'error');
                                                        
                                                        const sub = { id: Date.now(), name: '62hr 특판 예금', amount: val, interest: Math.floor(val * 0.01), isEvent: true, date: new Date().toLocaleDateString() };
                                                        updateUser({ balance: user.balance - val, subscriptions: [...(user.subscriptions||[]), sub] });
                                                        showToast('특판 예금 가입 성공!');
                                                    }}
                                                    className={`w-full py-4 rounded-2xl font-black shadow-lg transition-all ${eventTime.active ? 'bg-amber-400 text-amber-950 hover:scale-105' : 'bg-slate-300 text-white cursor-not-allowed'}`}>
                                                    {eventTime.waiting ? '오픈 대기중' : eventTime.ended ? '이벤트 종료' : '지금 가입하기'}
                                                </button>
                                            </div>
                                        </div>

                                        {/* 일반 예금 리스트 */}
                                        {products.map(p => (
                                            <div key={p.id} className="p-8 rounded-[2rem] border-2 border-slate-100 flex flex-col justify-between hover:border-indigo-100 transition-all bg-white group">
                                                <div>
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-full ${currentTheme.light} ${currentTheme.text}`}>Standard</span>
                                                        {user.role === 'admin' && <button onClick={() => setProducts(products.filter(x=>x.id!==p.id))} className="text-slate-200 hover:text-rose-500"><i className="fas fa-trash-alt"></i></button>}
                                                    </div>
                                                    <h4 className="text-xl font-black text-slate-800 mb-1">{p.name}</h4>
                                                    <p className="text-xs font-bold text-slate-400 mb-6">최소 10G부터 가치있는 저축</p>
                                                </div>
                                                <div>
                                                    <div className="flex justify-between items-end mb-6">
                                                        <span className="text-4xl font-black text-slate-800 tracking-tighter">{p.rate}<span className="text-lg">%</span></span>
                                                        <span className="text-xs font-bold text-slate-400 mb-1">연 이율 기준</span>
                                                    </div>
                                                    <button onClick={() => {
                                                        const amt = prompt('예치할 금액을 입력하세요.');
                                                        const val = parseInt(amt);
                                                        if(isNaN(val) || val <= 0) return;
                                                        if(user.balance < val) return showToast('잔액이 부족합니다.', 'error');
                                                        const sub = { id: Date.now(), name: p.name, amount: val, interest: Math.floor(val * (p.rate/100)), isEvent: false, date: new Date().toLocaleDateString() };
                                                        updateUser({ balance: user.balance - val, subscriptions: [...(user.subscriptions||[]), sub] });
                                                        showToast('예금 가입 완료');
                                                    }} className={`w-full py-4 rounded-2xl font-black transition-all bg-slate-800 text-white group-hover:bg-indigo-600 shadow-md`}>가입하기</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2.5rem] p-8 custom-shadow">
                                    <h3 className="text-xl font-black mb-6">보유중인 예금</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {user.subscriptions?.map(s => (
                                            <div key={s.id} className={`p-6 rounded-3xl border ${s.isEvent ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-100'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <p className="font-black text-slate-800">{s.name}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">{s.date} 가입</p>
                                                    </div>
                                                    {s.isEvent && <span className="bg-amber-400 text-amber-900 text-[9px] font-black px-2 py-0.5 rounded">EVENT</span>}
                                                </div>
                                                <div className="flex justify-between items-center mb-6">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-0.5">예치 원금</p>
                                                        <p className="text-xl font-black text-slate-800">{s.amount.toLocaleString()}G</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-black text-emerald-500 uppercase mb-0.5">예상 이자</p>
                                                        <p className="text-xl font-black text-emerald-500">+{s.interest.toLocaleString()}G</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => {
                                                    const total = s.amount + s.interest;
                                                    updateUser({ balance: user.balance + total, subscriptions: user.subscriptions.filter(x => x.id !== s.id) });
                                                    showToast('해지 및 수령이 완료되었습니다.');
                                                }} className="w-full bg-white border border-slate-200 py-3 rounded-xl font-black text-sm text-slate-600 hover:bg-slate-800 hover:text-white transition-all">만기 해지하기</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && user.role === 'admin' && (
                            <div className="bg-white rounded-[2.5rem] p-10 custom-shadow animate-fade">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black">통합 관리자 패널</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setSelectedIds(students.filter(s=>s.role!=='admin').map(s=>s.id))} className="text-xs font-black bg-slate-100 px-4 py-2 rounded-xl">전체 선택</button>
                                        <button onClick={() => setSelectedIds([])} className="text-xs font-black bg-slate-100 px-4 py-2 rounded-xl">해제</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 mb-10 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                                    {students.filter(s => s.role !== 'admin').map(s => (
                                        <button key={s.id} onClick={() => setSelectedIds(prev => prev.includes(s.id) ? prev.filter(i => i !== s.id) : [...prev, s.id])}
                                            className={`p-5 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 relative ${selectedIds.includes(s.id) ? 'border-indigo-600 bg-indigo-50' : 'border-slate-50 bg-slate-50'}`}>
                                            <div className="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-2xl overflow-hidden">
                                                {s.profileImg ? <img src={s.profileImg} className="w-full h-full object-cover" /> : s.profileEmoji}
                                            </div>
                                            <span className="text-sm font-black text-slate-800">{s.name}</span>
                                            <span className="text-[10px] font-bold text-slate-400">{s.balance.toLocaleString()}G</span>
                                            {selectedIds.includes(s.id) && <div className="absolute top-2 right-2 w-5 h-5 bg-indigo-600 rounded-full flex items-center justify-center text-[10px] text-white"><i className="fas fa-check"></i></div>}
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-slate-50 p-8 rounded-[2rem] space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input id="amt" type="number" placeholder="금액 (G)" className="w-full px-6 py-4 bg-white rounded-2xl outline-none font-black shadow-sm" />
                                        <input id="reason" type="text" placeholder="사유 입력" className="w-full px-6 py-4 bg-white rounded-2xl outline-none font-black shadow-sm" />
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => handleAction('issue', document.getElementById('amt').value, document.getElementById('reason').value)} className="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-emerald-600 transition-all">지급하기</button>
                                        <button onClick={() => handleAction('penalty', document.getElementById('amt').value, document.getElementById('reason').value)} className="flex-1 bg-rose-500 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-rose-600 transition-all">벌금부과</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {toast && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-black shadow-2xl animate-fade z-[100] flex items-center gap-3 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-800'}`}>
                            <i className={`fas fa-${toast.type === 'error' ? 'exclamation-circle' : 'check-circle'}`}></i>
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
