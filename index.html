<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>또다른 경제교실 - 스마트 금융 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f9; margin: 0; transition: background-color 0.3s; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .custom-shadow { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08); }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, arrayUnion, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'economy-system-v1';

        window.FB_UTILS = { auth, db, appId, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, arrayUnion, query, orderBy, deleteDoc, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_STUDENTS = [
            { id: '6701', name: '강유주' }, { id: '6702', name: '고윤서' }, { id: '6703', name: '공윤호' },
            { id: '6704', name: '김성민' }, { id: '6705', name: '김태윤' }, { id: '6706', name: '나현웅' },
            { id: '6707', name: '류찬혁' }, { id: '6708', name: '문예린' }, { id: '6709', name: '박소율' },
            { id: '6710', name: '박채윤' }, { id: '6711', name: '배예람' }, { id: '6712', name: '백한율' },
            { id: '6713', name: '우은서' }, { id: '6714', name: '우진서' }, { id: '6715', name: '윤소영' },
            { id: '6716', name: '임소윤' }, { id: '6717', name: '임수현' }, { id: '6718', name: '정시후' },
            { id: '6719', name: '조수빈' }, { id: '6720', name: '최리한' }, { id: '6721', name: '최은수' },
            { id: '6722', name: '최준성' }, { id: '6723', name: '하예준' }, { id: '6724', name: '허단' }
        ];

        const THEMES = {
            purple: { main: 'bg-indigo-600', text: 'text-indigo-600', border: 'border-indigo-600', light: 'bg-indigo-50', gradient: 'from-purple-600 to-fuchsia-500' },
            blue: { main: 'bg-blue-600', text: 'text-blue-600', border: 'border-blue-600', light: 'bg-blue-50', gradient: 'from-blue-600 to-cyan-500' },
            rose: { main: 'bg-rose-500', text: 'text-rose-500', border: 'border-rose-500', light: 'bg-rose-50', gradient: 'from-rose-500 to-orange-400' },
            emerald: { main: 'bg-emerald-500', text: 'text-emerald-500', border: 'border-emerald-500', light: 'bg-emerald-50', gradient: 'from-emerald-500 to-teal-400' },
            dark: { main: 'bg-slate-800', text: 'text-slate-800', border: 'border-slate-800', light: 'bg-slate-100', gradient: 'from-slate-800 to-slate-600' }
        };

        const EMOJIS = ['👤', '🦁', '🐱', '🦊', '🐻', '🐼', '🐨', '🐯', '🐸', '🦄', '🐲', '⭐', '💎', '🔥', '🌈'];

        const App = () => {
            const [fb, setFb] = useState(null);
            const [fbUser, setFbUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [students, setStudents] = useState([]);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [history, setHistory] = useState([]);
            const [products, setProducts] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [toast, setToast] = useState(null);
            const [activeBanner, setActiveBanner] = useState(0);

            // Firebase 초기화
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB_UTILS) {
                        setFb(window.FB_UTILS);
                        clearInterval(interval);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            // 인증 처리
            useEffect(() => {
                if (!fb) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(fb.auth);
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };
                initAuth();
                const unsub = fb.onAuthStateChanged(fb.auth, setFbUser);
                return () => unsub();
            }, [fb]);

            // 데이터 리스너
            useEffect(() => {
                if (!fb || !fbUser) return;

                const { db, appId, collection, onSnapshot, doc, setDoc } = fb;

                // 학생 정보 리스너
                const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                const unsubStudents = onSnapshot(studentsRef, async (snapshot) => {
                    let list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    if (list.length === 0) {
                        // 초기 데이터 생성
                        const promises = INITIAL_STUDENTS.map(s => {
                            return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', s.id), {
                                ...s, password: s.id, balance: 1000, profileEmoji: '👤', theme: 'purple', subscriptions: [], role: 'student'
                            });
                        });
                        promises.push(setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'admin'), {
                            id: 'admin', name: '관리자', password: '0000', balance: 0, profileEmoji: '👑', theme: 'dark', role: 'admin'
                        }));
                        await Promise.all(promises);
                    } else {
                        setStudents(list);
                        setIsLoading(false);
                    }
                });

                // 기록 리스너
                const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                const unsubHistory = onSnapshot(historyRef, (snapshot) => {
                    const hList = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHistory(hList.sort((a, b) => b.timestamp - a.timestamp));
                });

                // 상품 리스너
                const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                const unsubProducts = onSnapshot(productsRef, async (snapshot) => {
                    const pList = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (pList.length === 0) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', 'default-1'), {
                            name: '당일 성장 예금(24시간)', rate: 3.5, active: true, desc: '기본 하루 예금'
                        });
                    } else {
                        setProducts(pList);
                    }
                });

                return () => { unsubStudents(); unsubHistory(); unsubProducts(); };
            }, [fb, fbUser]);

            // 현재 로그인된 유저 데이터 실시간 업데이트
            useEffect(() => {
                if (user && students.length > 0) {
                    const updated = students.find(s => s.id === user.id);
                    if (updated) setUser(updated);
                }
            }, [students]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogin = (name, pw) => {
                if (isLoading) return showToast('데이터를 불러오는 중입니다. 잠시만 기다려주세요.', 'error');
                
                const found = students.find(s => s.name === name && s.password === pw);
                if (found) {
                    setUser(found);
                    setView('home');
                    showToast(`${found.name}님 환영합니다.`);
                } else {
                    showToast('정보를 다시 확인해주세요.', 'error');
                }
            };

            const updateUser = async (data) => {
                if (!fb || !user) return;
                await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'students', user.id), data, { merge: true });
            };

            const handleAction = async (type, amount, reason) => {
                const val = parseInt(amount);
                if (isNaN(val) || val <= 0 || selectedIds.length === 0) return showToast('금액과 대상을 확인하세요.', 'error');

                const groupId = Date.now().toString();
                const targetStudents = students.filter(s => selectedIds.includes(s.id));
                
                const promises = selectedIds.map(id => {
                    const s = students.find(x => x.id === id);
                    const newBal = type === 'issue' ? s.balance + val : s.balance - val;
                    return fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'students', id), { balance: newBal }, { merge: true });
                });

                promises.push(fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'history', groupId), {
                    targets: [...selectedIds],
                    targetNames: targetStudents.map(s => s.name),
                    summary: `${targetStudents[0].name}${targetStudents.length > 1 ? ` 외 ${targetStudents.length - 1}명` : ''}`,
                    type, amount: val, reason: reason || '기타',
                    date: new Date().toLocaleString(),
                    timestamp: Date.now(),
                    status: 'active'
                }));

                await Promise.all(promises);
                setSelectedIds([]);
                showToast('처리가 완료되었습니다.');
            };

            const currentTheme = THEMES[user?.theme || 'purple'];

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                    <div className="max-w-4xl w-full bg-white rounded-[2.5rem] shadow-2xl flex flex-col md:flex-row overflow-hidden border border-slate-200">
                        <div className="md:w-5/12 bg-indigo-600 p-12 text-white flex flex-col justify-center relative">
                            <h1 className="text-4xl font-black mb-4 z-10 leading-tight">또다른<br/>경제교실</h1>
                            <p className="text-indigo-100 font-medium z-10">데이터 동기화 완료</p>
                        </div>
                        <div className="md:w-7/12 p-12 bg-white">
                            <h2 className="text-2xl font-black text-slate-800 mb-8">로그인</h2>
                            {isLoading ? (
                                <div className="text-center py-10">
                                    <i className="fas fa-circle-notch fa-spin text-3xl text-indigo-500 mb-4"></i>
                                    <p className="font-bold text-slate-500">서버 데이터 연결 중...</p>
                                </div>
                            ) : (
                                <div className="space-y-5">
                                    <input id="uname" type="text" placeholder="성함 입력" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-bold" />
                                    <input id="upw" type="password" placeholder="비밀번호" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-bold" />
                                    <button onClick={() => handleLogin(document.getElementById('uname').value, document.getElementById('upw').value)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all mt-4">접속하기</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#f3f4f9] pb-20">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className={`w-9 h-9 ${currentTheme.main} rounded-xl flex items-center justify-center text-white shadow-lg`}><i className="fas fa-landmark text-sm"></i></div>
                            <span className="font-black text-lg tracking-tighter text-slate-800 uppercase">Economy</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('home')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${view === 'home' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>홈</button>
                            <button onClick={() => setView('bank')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${view === 'bank' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>은행</button>
                            {user.role === 'admin' && (
                                <button onClick={() => setView('admin')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${view === 'admin' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>관리</button>
                            )}
                        </div>
                        <button onClick={() => { setView('login'); setUser(null); }} className="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:bg-rose-50 hover:text-rose-500 transition-all"><i className="fas fa-sign-out-alt"></i></button>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 md:p-8 animate-fade">
                        {view === 'home' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8 space-y-8">
                                    <div className="bg-white rounded-[2.5rem] p-10 custom-shadow relative overflow-hidden group">
                                        <p className="text-slate-400 font-bold text-sm mb-2">가용 자산</p>
                                        <div className="flex items-baseline gap-2 relative z-10">
                                            <span className={`text-7xl font-black tracking-tighter ${currentTheme.text}`}>{user.balance.toLocaleString()}</span>
                                            <span className="text-2xl font-black text-slate-300">G</span>
                                        </div>
                                        <div className={`absolute top-1/2 -right-10 -translate-y-1/2 w-48 h-48 rounded-full ${currentTheme.light} flex items-center justify-center text-5xl opacity-30`}>
                                            <i className="fas fa-coins"></i>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[2.5rem] p-8 custom-shadow">
                                        <h3 className="text-lg font-black mb-6">최근 기록</h3>
                                        <div className="space-y-4">
                                            {history.filter(h => user.role === 'admin' || h.targets.includes(user.id)).slice(0, 10).map(h => (
                                                <div key={h.id} className="p-5 bg-slate-50 rounded-2xl flex justify-between items-center">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${h.type === 'issue' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            <i className={`fas fa-${h.type === 'issue' ? 'plus' : 'minus'} text-xs`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="text-sm font-black text-slate-800">{h.reason}</p>
                                                            <p className="text-[10px] font-bold text-slate-400">{h.date}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`font-black text-lg ${h.type === 'issue' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {h.type === 'issue' ? '+' : '-'}{h.amount.toLocaleString()}G
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-4 space-y-8">
                                    <div className="bg-white rounded-[2.5rem] p-8 custom-shadow text-center">
                                        <div className="w-24 h-24 rounded-[2rem] bg-slate-50 mx-auto mb-4 flex items-center justify-center text-5xl border-4 border-white shadow-lg overflow-hidden">
                                            {user.profileImg ? <img src={user.profileImg} className="w-full h-full object-cover" /> : user.profileEmoji}
                                        </div>
                                        <h4 className="font-black text-slate-800 text-lg">{user.name}</h4>
                                        <p className="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">{user.role}</p>
                                        
                                        <div className="border-t border-slate-100 pt-6 space-y-6 text-left">
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 mb-3 uppercase">Profile Icon</p>
                                                <div className="grid grid-cols-5 gap-2">
                                                    {EMOJIS.map(e => (
                                                        <button key={e} onClick={() => updateUser({ profileEmoji: e, profileImg: null })} className={`text-xl p-2 rounded-xl hover:bg-slate-100 ${user.profileEmoji === e ? 'bg-indigo-50 ring-1 ring-indigo-200' : ''}`}>{e}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'bank' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {products.filter(p => p.active).map(p => (
                                        <div key={p.id} className="bg-white p-8 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xl font-black mb-2">{p.name}</h4>
                                                <p className="text-xs text-slate-400 mb-6">{p.desc}</p>
                                            </div>
                                            <div className="flex justify-between items-end mb-6">
                                                <span className="text-4xl font-black">{p.rate}%</span>
                                            </div>
                                            <button onClick={() => {
                                                const amt = prompt('예치할 금액?');
                                                const v = parseInt(amt);
                                                if(!v || v <= 0 || user.balance < v) return showToast('금액을 확인하세요.', 'error');
                                                const sub = { id: Date.now(), name: p.name, amount: v, interest: Math.floor(v * (p.rate/100)), date: new Date().toLocaleDateString() };
                                                updateUser({ balance: user.balance - v, subscriptions: [...(user.subscriptions||[]), sub] });
                                                showToast('가입 완료!');
                                            }} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">가입하기</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'admin' && user.role === 'admin' && (
                            <div className="space-y-8">
                                <div className="bg-white rounded-[2.5rem] p-10 custom-shadow">
                                    <h3 className="text-2xl font-black mb-8 text-slate-800">학생 일괄 관리</h3>
                                    <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-3 mb-8">
                                        {students.filter(s => s.role !== 'admin').map(s => (
                                            <button key={s.id} onClick={() => setSelectedIds(prev => prev.includes(s.id) ? prev.filter(i => i !== s.id) : [...prev, s.id])}
                                                className={`p-3 rounded-2xl border-2 text-center transition-all ${selectedIds.includes(s.id) ? 'border-indigo-600 bg-indigo-50' : 'border-slate-50 bg-white'}`}>
                                                <p className="text-xs font-black">{s.name}</p>
                                                <p className="text-[8px] font-bold text-slate-400">{s.balance}G</p>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex gap-4">
                                        <input id="amt" type="number" placeholder="금액" className="flex-1 px-6 py-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                        <input id="reason" type="text" placeholder="사유" className="flex-1 px-6 py-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                    </div>
                                    <div className="flex gap-4 mt-4">
                                        <button onClick={() => handleAction('issue', document.getElementById('amt').value, document.getElementById('reason').value)} className="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-black">지급</button>
                                        <button onClick={() => handleAction('penalty', document.getElementById('amt').value, document.getElementById('reason').value)} className="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-black">차감</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {toast && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-black shadow-2xl z-[100] ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-900'}`}>
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
