<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>또다른 경제교실 - 스마트 금융 시스템</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f9; margin: 0; transition: background-color 0.3s; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="password"] { font-family: sans-serif; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, arrayUnion, query, orderBy, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'economy-system-v6';

        window.FB_UTILS = { 
            auth, db, appId, doc, setDoc, getDoc, onSnapshot, collection, 
            updateDoc, arrayUnion, query, orderBy, deleteDoc, addDoc,
            signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = window.React;

        const INITIAL_STUDENTS = [
            // 기존 학생
            { id: '6701', name: '강유주', password: '6701' }, { id: '6702', name: '고윤서', password: '6702' }, { id: '6703', name: '공윤호', password: '6703' },
            { id: '6704', name: '김성민', password: '6704' }, { id: '6705', name: '김태윤', password: '6705' }, { id: '6706', name: '나현웅', password: '6706' },
            { id: '6707', name: '류찬혁', password: '6707' }, { id: '6708', name: '문예린', password: '6708' }, { id: '6709', name: '박소율', password: '6709' },
            { id: '6710', name: '박채윤', password: '6710' }, { id: '6711', name: '배예람', password: '6711' }, { id: '6712', name: '백한율', password: '6712' },
            { id: '6713', name: '우은서', password: '6713' }, { id: '6714', name: '우진서', password: '6714' }, { id: '6715', name: '윤소영', password: '6715' },
            { id: '6716', name: '임소윤', password: '6716' }, { id: '6717', name: '임수현', password: '6717' }, { id: '6718', name: '정시후', password: '6718' },
            { id: '6719', name: '조수빈', password: '6719' }, { id: '6720', name: '최리한', password: '6720' }, { id: '6721', name: '최은수', password: '6721' },
            { id: '6722', name: '최준성', password: '6722' }, { id: '6723', name: '하예준', password: '6723' }, { id: '6724', name: '허단', password: '6724' },
            // 요청하신 신규 학생 명단 (자동 등록)
            { id: 'readin', name: '리드인', password: 'readin' },
            { id: 'kdo', name: '김단우', password: 'kdo' },
            { id: 'ksw', name: '김성원', password: 'ksw' },
            { id: 'rdi', name: '류다인', password: 'rdi' },
            { id: 'mjs', name: '문준서', password: 'mjs' },
            { id: 'lse', name: '이서은', password: 'lse' },
            { id: 'isw', name: '임신원', password: 'isw' },
            { id: 'iyh', name: '임유하', password: 'iyh' },
            { id: 'lch', name: '임채훈', password: 'lch' },
            { id: 'jsi', name: '정소이', password: 'jsi' },
            { id: 'jys', name: '조예성', password: 'jys' },
            { id: 'cjs', name: '최준성', password: 'cjs' },
            { id: 'hhs', name: '하현서', password: 'hhs' }
        ];

        const INITIAL_PRODUCTS = [
            { id: 'p1', name: '기본 예금', desc: '언제든 넣고 빼는 자유로운 예금', rate: 1.5, price: 0 },
            { id: 'p2', name: '꿈나무 적금', desc: '매달 꾸준히 모으는 즐거움', rate: 4.5, price: 500 },
            { id: 'p3', name: '챌린지 펀드', desc: '높은 수익률을 노리는 투자 상품', rate: 8.0, price: 1000 }
        ];

        const App = () => {
            const [fb, setFb] = useState(null);
            const [fbUser, setFbUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [students, setStudents] = useState([]);
            const [products, setProducts] = useState([]);
            const [history, setHistory] = useState([]);
            const [pendingUsers, setPendingUsers] = useState([]);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [loginMode, setLoginMode] = useState('student'); // student, admin, new
            const [selectedIds, setSelectedIds] = useState([]);
            const [toast, setToast] = useState(null);

            // Firebase 초기화 및 Auth
            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB_UTILS) {
                        const utils = window.FB_UTILS;
                        setFb(utils);
                        clearInterval(checkFB);
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await utils.signInWithCustomToken(utils.auth, __initial_auth_token);
                            } else {
                                await utils.signInAnonymously(utils.auth);
                            }
                        } catch (e) { console.error("Auth Fail", e); }
                        utils.onAuthStateChanged(utils.auth, (u) => u && setFbUser(u));
                    }
                }, 100);
                return () => clearInterval(checkFB);
            }, []);

            // 실시간 데이터 동기화
            useEffect(() => {
                if (!fb || !fbUser) return;
                const { db, appId, collection, onSnapshot, doc, setDoc } = fb;
                
                const unsubStudents = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), async (snap) => {
                    if (snap.empty) {
                        const ops = INITIAL_STUDENTS.map(s => 
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', s.id), {
                                ...s, balance: 1000, profileEmoji: '👤', theme: 'purple', subscriptions: [], role: 'student'
                            })
                        );
                        ops.push(setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', 'admin'), {
                            id: 'admin', name: '관리자', password: 'cjs0128', balance: 0, profileEmoji: '👑', theme: 'dark', role: 'admin'
                        }));
                        await Promise.all(ops);
                    } else {
                        setStudents(snap.docs.map(d => d.data()));
                        setIsLoading(false);
                    }
                });

                const unsubProducts = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), async (snap) => {
                    if (snap.empty) {
                        await Promise.all(INITIAL_PRODUCTS.map(p => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', p.id), p)));
                    } else {
                        setProducts(snap.docs.map(d => d.data()));
                    }
                });

                const unsubHistory = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                    setHistory(snap.docs.map(d => d.data()).sort((a,b) => b.timestamp - a.timestamp));
                });

                const unsubPending = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), (snap) => {
                    setPendingUsers(snap.docs.map(d => ({ ...d.data(), firebaseId: d.id })));
                });

                return () => { unsubStudents(); unsubProducts(); unsubHistory(); unsubPending(); };
            }, [fb, fbUser]);

            useEffect(() => {
                if (user) {
                    const current = students.find(s => s.id === user.id);
                    if (current) setUser(current);
                }
            }, [students]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogin = (name, pw) => {
                const found = students.find(s => s.name === name && s.password === pw);
                if (found) {
                    if (loginMode === 'admin' && found.role !== 'admin') {
                        return showToast('관리자 권한이 없습니다.', 'error');
                    }
                    setUser(found);
                    setView('home');
                    showToast(`${found.name}님 환영합니다.`);
                } else {
                    showToast('정보가 일치하지 않습니다.', 'error');
                }
            };

            const handleSignUp = async (name, pw, pwConfirm) => {
                if (!name || !pw || !pwConfirm) return showToast('모든 정보를 입력해주세요.', 'error');
                if (pw !== pwConfirm) return showToast('비밀번호가 일치하지 않습니다.', 'error');
                if (students.find(s => s.name === name)) return showToast('이미 등록된 이름입니다.', 'error');
                
                try {
                    await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'registrations'), {
                        name, password: pw, timestamp: Date.now(), status: 'pending'
                    });
                    showToast('가입 신청이 완료되었습니다! 관리자 승인을 기다려주세요.');
                    setLoginMode('student');
                } catch (e) {
                    showToast('신청 중 오류가 발생했습니다.', 'error');
                }
            };

            const approveUser = async (pUser) => {
                const newId = `new_${Date.now()}`;
                await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'students', newId), {
                    id: newId, name: pUser.name, password: pUser.password, balance: 1000, 
                    profileEmoji: '👤', theme: 'purple', subscriptions: [], role: 'student'
                });
                await fb.deleteDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'registrations', pUser.firebaseId));
                showToast(`${pUser.name} 학생의 가입을 승인했습니다.`);
            };

            const handleJoinProduct = async (product) => {
                if (user.balance < product.price) return showToast('잔액이 부족합니다.', 'error');
                if (user.subscriptions?.includes(product.id)) return showToast('이미 가입된 상품입니다.', 'error');

                await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'students', user.id), {
                    balance: user.balance - product.price,
                    subscriptions: fb.arrayUnion(product.id)
                });

                await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'history', Date.now().toString()), {
                    targets: [user.id], summary: user.name, type: 'payment', amount: product.price,
                    reason: `은행 상품 가입: ${product.name}`, date: new Date().toLocaleString(), timestamp: Date.now()
                });
                showToast(`${product.name} 가입 완료!`);
            };

            const handleBulkAction = async (type, amount, reason) => {
                if (!amount || isNaN(amount) || selectedIds.length === 0) return showToast('대상과 금액을 확인하세요.', 'error');
                const val = parseInt(amount);
                const updates = selectedIds.map(id => {
                    const s = students.find(x => x.id === id);
                    const newBal = type === 'issue' ? s.balance + val : s.balance - val;
                    return fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'students', id), { balance: newBal });
                });
                updates.push(fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'history', Date.now().toString()), {
                    targets: [...selectedIds], summary: `${students.find(x=>x.id===selectedIds[0])?.name} 외 ${selectedIds.length-1}명`,
                    type, amount: val, reason: reason || '관리자 처리', date: new Date().toLocaleString(), timestamp: Date.now()
                }));
                await Promise.all(updates);
                setSelectedIds([]);
                showToast('정상 처리되었습니다.');
            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-white"><div className="animate-spin w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full"></div></div>;

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4 font-['Pretendard']">
                    <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden animate-fade">
                        <div className="bg-indigo-600 p-8 text-white text-center">
                            <h1 className="text-3xl font-black mb-2">스마트 금융 시스템</h1>
                            <p className="opacity-70 text-sm tracking-widest uppercase">Smart Class Economy</p>
                        </div>
                        <div className="p-8">
                            <div className="flex mb-8 bg-slate-50 p-1 rounded-2xl">
                                {['student', 'admin', 'new'].map(m => (
                                    <button key={m} onClick={() => setLoginMode(m)} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${loginMode === m ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>
                                        {m === 'student' ? '학생' : m === 'admin' ? '관리자' : '신규학생'}
                                    </button>
                                ))}
                            </div>
                            
                            {loginMode !== 'new' ? (
                                <div className="space-y-4">
                                    <input id="l_name" type="text" placeholder="성함 입력" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-bold" />
                                    <input id="l_pw" type="password" placeholder="비밀번호" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-bold" />
                                    <button onClick={() => handleLogin(document.getElementById('l_name').value, document.getElementById('l_pw').value)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all active:scale-95">입장하기</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <p className="text-xs text-center text-slate-400 font-bold mb-4">신규 가입 신청을 하면 관리자 승인 후 이용 가능합니다.</p>
                                    <input id="s_name" type="text" placeholder="이름 (예: 홍길동)" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-bold" />
                                    <input id="s_pw" type="password" placeholder="사용할 비밀번호" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-bold" />
                                    <input id="s_pw_c" type="password" placeholder="비밀번호 확인" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-bold" />
                                    <button onClick={() => handleSignUp(document.getElementById('s_name').value, document.getElementById('s_pw').value, document.getElementById('s_pw_c').value)} className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-emerald-600 transition-all active:scale-95">가입 신청하기</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs"><i className="fas fa-landmark"></i></div>
                            <span className="font-black text-slate-800">ECONOMY</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('home')} className={`px-4 py-2 rounded-lg text-xs font-bold ${view === 'home' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>홈</button>
                            <button onClick={() => setView('bank')} className={`px-4 py-2 rounded-lg text-xs font-bold ${view === 'bank' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>은행</button>
                            {user.role === 'admin' && <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-lg text-xs font-bold ${view === 'admin' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>관리</button>}
                        </div>
                        <button onClick={() => setView('login')} className="text-slate-400"><i className="fas fa-sign-out-alt"></i></button>
                    </nav>

                    <main className="max-w-5xl mx-auto p-6 animate-fade">
                        {view === 'home' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 space-y-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-lg">
                                        <p className="text-slate-400 font-bold text-xs mb-1 uppercase tracking-wider">나의 자산</p>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-6xl font-black tracking-tighter text-indigo-600">{user.balance.toLocaleString()}</span>
                                            <span className="text-xl font-black text-slate-300">G</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm">
                                        <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2"><i className="fas fa-history text-indigo-400"></i> 거래 내역</h3>
                                        <div className="space-y-3">
                                            {history.filter(h => user.role === 'admin' || h.targets.includes(user.id)).slice(0, 10).map((h, i) => (
                                                <div key={i} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                                    <div>
                                                        <p className="text-sm font-black text-slate-800">{h.reason}</p>
                                                        <p className="text-[10px] text-slate-400">{h.date}</p>
                                                    </div>
                                                    <p className={`font-black ${h.type === 'issue' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                        {h.type === 'issue' ? '+' : '-'}{h.amount.toLocaleString()}G
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-8">
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm text-center">
                                        <div className="text-5xl mb-4">{user.profileEmoji}</div>
                                        <h4 className="font-black text-slate-800">{user.name} {user.role === 'admin' ? '관리자' : '학생'}</h4>
                                        <p className="text-xs text-slate-400 mt-1 uppercase tracking-tighter">ID: {user.id}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'bank' && (
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 mb-8">경제교실 중앙은행</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {products.map(p => (
                                        <div key={p.id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-transparent hover:border-indigo-400 transition-all flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xl font-black mb-2">{p.name}</h4>
                                                <p className="text-xs text-slate-400 mb-6 leading-relaxed">{p.desc}</p>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-6">
                                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase">이율</p><p className="text-2xl font-black text-indigo-600">{p.rate}%</p></div>
                                                    <div className="text-right"><p className="text-[10px] font-bold text-slate-400 uppercase">가입비</p><p className="text-xl font-black text-slate-800">{p.price}G</p></div>
                                                </div>
                                                <button onClick={() => handleJoinProduct(p)} className={`w-full py-4 rounded-2xl font-black transition-all ${user.subscriptions?.includes(p.id) ? 'bg-slate-100 text-slate-400' : 'bg-indigo-600 text-white shadow-lg'}`}>
                                                    {user.subscriptions?.includes(p.id) ? '가입 완료' : '지금 가입하기'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-8">
                                {pendingUsers.length > 0 && (
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border-4 border-emerald-50">
                                        <h3 className="text-xl font-black mb-6 text-emerald-600 flex items-center gap-2"><i className="fas fa-user-plus"></i> 가입 신청 대기 ({pendingUsers.length})</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {pendingUsers.map(p => (
                                                <div key={p.firebaseId} className="p-5 bg-slate-50 rounded-2xl flex justify-between items-center">
                                                    <div>
                                                        <p className="font-black text-slate-800 text-lg">{p.name}</p>
                                                        <p className="text-xs text-slate-400">신청일: {new Date(p.timestamp).toLocaleDateString()}</p>
                                                    </div>
                                                    <button onClick={() => approveUser(p)} className="px-6 py-3 bg-emerald-500 text-white rounded-xl font-black text-xs hover:bg-emerald-600 transition-all shadow-md">승인하기</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white p-10 rounded-[2.5rem] shadow-sm">
                                    <h3 className="text-xl font-black mb-8 text-slate-800">전체 학생 관리</h3>
                                    <div className="grid grid-cols-4 sm:grid-cols-8 gap-3 mb-8 max-h-[400px] overflow-y-auto no-scrollbar p-2">
                                        {students.filter(s => s.role !== 'admin').map(s => (
                                            <button key={s.id} onClick={() => setSelectedIds(prev => prev.includes(s.id) ? prev.filter(i => i !== s.id) : [...prev, s.id])}
                                                className={`p-3 rounded-2xl border-2 text-center transition-all ${selectedIds.includes(s.id) ? 'border-indigo-600 bg-indigo-50' : 'border-slate-50 hover:border-slate-200'}`}>
                                                <div className="text-xl">{s.profileEmoji}</div>
                                                <p className="text-[10px] font-black truncate">{s.name}</p>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                        <input id="a_amt" type="number" placeholder="금액 (G)" className="px-6 py-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                        <input id="a_reason" type="text" placeholder="사유 (예: 활동 우수)" className="px-6 py-4 bg-slate-50 rounded-2xl font-bold outline-none" />
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => handleBulkAction('issue', document.getElementById('a_amt').value, document.getElementById('a_reason').value)} className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">일괄 지급</button>
                                        <button onClick={() => handleBulkAction('penalty', document.getElementById('a_amt').value, document.getElementById('a_reason').value)} className="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg">일괄 차감</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {toast && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-black shadow-2xl z-[100] animate-fade ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-900'}`}>
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        };

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
